<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduler Oscilloscope</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg border-bottom sticky-top bg-body">
        <div class="container">
            <a class="navbar-brand fw-bold text-green" href="#">
                [ 📡 SYSTEM OSCILLOSCOPE ]
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-3 pt-3 pt-lg-0">
                    <li class="nav-item"><a class="nav-link fw-medium high-contrast-text" href="#metrics">Live Metrics</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium high-contrast-text" href="#dlq">DLQ Control</a></li>
                    <li class="nav-item ms-lg-2">
                        <button class="btn btn-sm btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center" id="themeToggle" style="width: 40px; height: 40px;" aria-label="Toggle Theme">
                            <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <section class="py-5 my-4 border-bottom">
            <div class="row align-items-center">
                <div class="col-lg-9">
                    <h1 class="display-5 fw-bold high-contrast-text mb-2">Worker Node Telemetry</h1>
                    <h2 class="h4 fw-bold text-green mb-3">Real-Time Load Distribution</h2>
                    <p class="fs-5 high-contrast-text mb-4" style="max-width: 700px;">
                        Streaming unbuffered systemic load directly from the PostgreSQL instances. All timestamps are localized to Lagos (WAT).
                    </p>
                </div>
            </div>
        </section>

        <section id="metrics" class="py-5">
            <h2 class="fw-bold section-title high-contrast-text">Active Pipeline</h2>
            <div class="row g-4 justify-content-center">
                <div class="col-6 col-md-4 col-lg-2">
                    <div class="card project-card bg-body-tertiary border p-4 text-center">
                        <h3 class="h6 fw-bold high-contrast-text mb-2 text-uppercase">Pending</h3>
                        <p class="fs-2 fw-bold text-green mb-0" id="count-PENDING">0</p>
                    </div>
                </div>
                <div class="col-6 col
