name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scheduler_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      SECRET_KEY: "ci-secret-key-not-used-in-prod"
      DLQ_ALERT_THRESHOLD: "10"
      STARVATION_THRESHOLD_MINUTES: "15"
      WORKER_POLL_INTERVAL: "1"
      CONCURRENCY_LIMIT: "5"
      EMAIL_FAILURE_RATE: "0.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ -v